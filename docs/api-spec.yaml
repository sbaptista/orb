openapi: 3.1.0
info:
  title: Orb Task API
  version: 1.0.0
  description: |
    Machine-readable spec for the Orb task management API.
    Agents and integrations MUST consult this spec to know what is
    and is not possible before attempting any action.
  x-orb-agent-contract:
    description: >
      REST/API integration guidance for external agents and clients. The live
      conversational Orb prompt is governed by lib/orb-prompt.ts and assembled
      by app/actions/orb-converse.ts; this REST spec must not define or generate
      conversational prompt law.
    
    scope:
      default_project: ORB
      behavior: REST clients should pass explicit project filters when a request is project-scoped.
    
    valid_values:
      statuses: [open, in progress, on hold, closed]
      priorities:
        1: Urgent
        2: High
        4: Medium
        5: Low

  x-orb-internal-tools:
    query_repository:
      confidence: new
      description: 'Inspect the Orb source repository. Use this for questions about implementation, components, routes, configuration, documentation, or actual code behavior. On localhost, source=local reads the current working tree and source=production reads the current Vercel deployment. In production, only source=production is available. Access is restricted to Admin, Super Admin, and Developer roles.'
      input_schema:
        type: object
        properties:
          operation:
            type: string
            enum: ['list', 'search', 'read']
            description: 'list returns readable files, search finds matching source lines, and read returns a numbered line range.'
          source:
            type: string
            enum: ['local', 'production']
            description: 'Defaults to local on localhost and production in production.'
          path:
            type: string
            description: 'Optional relative directory for list/search, or required relative file path for read.'
          query:
            type: string
            description: 'Text to find. Required for search.'
          start_line:
            type: integer
            description: 'First line for read. Defaults to 1.'
          end_line:
            type: integer
            description: 'Last line for read. Capped at 400 lines per call.'
          max_results:
            type: integer
            description: 'Maximum list/search results. Defaults to 30, maximum 100.'
        required: ['operation']

    query_todos:
      confidence: well-tested
      description: 'Find todos matching criteria. Use code for single-todo lookup (e.g. "ORB-73"). Otherwise filters by status, product, priority, category, or text. Returns all statuses by default — pass status to narrow. Use category to find todos tagged with a specific category (e.g. "Bug") — a general bug-count question ("how many bugs do I have") should filter by category="Bug", not guess from title text_match.'
      input_schema:
        type: object
        properties:
          code: { type: string, description: 'Exact task code for single-todo lookup, e.g. "ORB-62". Overrides all other filters.' }
          product_code: { type: string }
          status: { type: string }
          category: { type: string, description: 'Filter by category name, e.g. "Bug". Case-insensitive, exact match against the CATEGORIES list for that project.' }
          priority_max: { type: integer }
          text_match: { type: string }
          max_results: { type: integer }

    query_projects:
      confidence: new
      description: 'List or look up specific missing project facts — name, description, owner, active/total task counts, dormant state, or partial-name resolution. Use when the BACKLOG does not already contain the fact needed to answer, such as who owns X, whether X is asleep, or resolving a project name. If the user asks who owns projects and BACKLOG has no owner tags, call query_projects. If the user asks which projects are dormant and BACKLOG has no explicit DORMANT section, call query_projects with include_dormant=true. NOT for task queries (use query_todos). For broad project-health reads such as "tell me about my projects" or "anything stand out?", answer from BACKLOG when it already includes project names, owners, descriptions, SUMMARY counts, and the DORMANT section. Takes the project NAME (partial/fuzzy ok), never a code.'
      input_schema:
        type: object
        properties:
          name: { type: string, description: 'Project name to look up — partial or fuzzy matches resolve. Omit to list all visible projects.' }
          include_dormant: { type: boolean, description: 'Also include dormant (sleeping) projects. Default false.' }
          max_results: { type: integer, description: 'Max projects to return. Default 50.' }

    query_tickets:
      confidence: new
      description: 'Look up reporter-filed tickets (bugs, suggestions, capability gaps, workflow friction) — status, type, summary, linked todo. Admin-only. Use for "what is the status of ticket X", "any open bugs", "show tickets about Y". NOT for engineering todos (use query_todos) — tickets are the reporter-facing feedback queue that create_ticket writes to. Provide code for one specific ticket (returns full detail); omit it to list/filter (returns a compact summary per ticket). READ-ONLY: there is no update/close/delete tool for tickets. Never offer to close, update, resolve, or delete a ticket — if the user wants a ticket changed, tell them to use Settings → Tickets.'
      input_schema:
        type: object
        properties:
          code: { type: string, description: 'Exact ticket code, e.g. "TICKETS-42". Overrides all other filters and returns full detail for that one ticket.' }
          status: { type: string, description: 'Filter by exact status (open, in_progress, pending, awaiting_input, pending_release, pending_verification, on_hold, deferred, closed, dismissed).' }
          scope: { type: string, enum: ['active', 'all'], description: 'active = not closed/dismissed. Defaults to active.' }
          type: { type: string, description: 'Filter by type: bug, suggestion, capability_gap, workflow_friction.' }
          search: { type: string, description: 'Text search against summary.' }
          max_results: { type: integer, description: 'Max tickets to return. Default 20.' }

    query_db:
      confidence: well-tested
      description: 'Run a bounded read-only structural query through the Supabase query builder. Use for date ranges, URL/array filters, cross-table lookups, and columns not exposed by a first-class read tool. Never raw SQL. Always provide the allowlisted table explicitly.'
      input_schema:
        type: object
        additionalProperties: false
        properties:
          table:
            type: string
            enum: ['todos', 'projects', 'knowledge_repo', 'audit_log', 'statuses', 'priorities', 'categories', 'groups', 'tickets']
            description: 'Allowlisted table to query.'
          select:
            type: string
            description: 'Comma-separated plain column names. Defaults to all columns.'
          filters:
            type: array
            items:
              type: object
              additionalProperties: false
              properties:
                column: { type: string }
                op:
                  type: string
                  enum: ['eq', 'neq', 'gt', 'gte', 'lt', 'lte', 'like', 'ilike', 'is', 'in', 'contains', 'overlaps', 'not.is']
                value: {}
              required: ['column', 'op', 'value']
          order:
            type: string
            description: 'Column name, or -column for descending order.'
          limit:
            type: integer
            minimum: 1
            maximum: 200
            description: 'Maximum rows. Defaults to 50.'
        required: ['table']

    client_action:
      confidence: well-tested
      description: 'Navigate or switch UI state. Use switch_project to change the active project, open_settings to go to settings, open_help for help. Use set_voice to change the TTS voice (target = voice name). Use exit_voice to end voice conversation mode when the user signals they want to stop. For switch_project, call the tool and do not narrate "Switching to...", "I switched", "done", or "is now active" in the same response; the client confirms after navigation succeeds.'
      input_schema:
        type: object
        properties:
          action: { type: string, enum: ['switch_project', 'open_settings', 'open_help', 'set_voice', 'exit_voice'] }
          target: { type: string, description: 'Project name for switch_project (the user speaks in names; the server resolves it — do not translate to a code), voice name for set_voice.' }
        required: ['action']

    search_knowledge:
      confidence: well-tested
      description: 'Read the Knowledge Repository — the CRUD read tool for knowledge_repo, usable for topic discovery AND precise single-entry lookup. Use `query` for topic/discovery search ("what do we know about X") — ranked results, up to 10 returned. Use `title` instead when the user names or references ONE specific entry (e.g. "show me that entry", "show me the entry titled X", verifying an update just made) — this resolves with leeway like update_knowledge does (exact match, then a partial/fuzzy reference covering most of its own words), not a literal exact string. Provide `query` or `title`, not both. Optionally scope to a specific project.'
      input_schema:
        type: object
        properties:
          query: { type: string, description: 'Topic/discovery search term. Omit if using title.' }
          title: { type: string, description: 'A specific entry title reference for precise lookup — exact or approximate/partial is fine, leeway is intentional since the user may not recall the exact title. Resolves to one entry, asks to disambiguate if multiple match, or reports not found. Omit if using query.' }
          product_code: { type: string, description: 'Scope search to a specific project.' }

    add_knowledge:
      confidence: well-tested
      description: 'Write an insight, decision, or reference material directly to the Knowledge Repository. Use this to preserve important information from the conversation without creating a task. Defaults to the current project if product_code is omitted. You should proactively ask the user "Would you like me to save this to the knowledge repository?" when a valuable decision or insight is reached.'
      input_schema:
        type: object
        properties:
          product_code: { type: string, description: 'Target project code (e.g. ORB). Defaults to current project if omitted.' }
          title: { type: string, description: 'Short title or summary of the insight.' }
          content: { type: string, description: 'Detailed content of the insight, decision, or reference material.' }
          tags:
            type: array
            items: { type: string }
            description: 'Optional tags to categorize the knowledge.'
        required: ['title', 'content']

    update_knowledge:
      confidence: new
      description: 'Correct or amend an existing Knowledge Repository entry. Like update_project, call this directly with the title reference you have (exact or approximate) — the server resolves it (exact match, then substring) and tells you if it is ambiguous or not found; you do not need to search_knowledge first as a separate step. If the user says entry titled "..." then call update_knowledge immediately with that title. Only call search_knowledge beforehand if you genuinely do not know which entry the user means and need to find it by topic. A vague phrase like "that entry" plus an assistant natural-language summary is not a reliable title reference; search first. Held for user confirmation like update_project — never claim it is done until confirm_mutation succeeds. Do NOT include a date, timestamp, or attribution line in new_content — the server signs and stamps every update automatically. There is deliberately NO delete tool: if an entry looks stale or wrong and you cannot fix it with an update, use create_ticket to flag it for admin review instead.'
      input_schema:
        type: object
        properties:
          title: { type: string, description: 'The existing entry title to update — partial/fuzzy matches resolve, like project names. Never a code or id.' }
          new_content: { type: string, description: 'Replacement content. Omit to leave content unchanged.' }
          new_title: { type: string, description: 'Replacement title. Omit to leave the title unchanged.' }
        required: ['title']

    query_audit_trail:
      confidence: new
      description: 'Query the audit trail to answer questions like "who closed this?", "what changed last week?", or "show me recent activity". Returns timestamped events with before/after snapshots.'
      input_schema:
        type: object
        properties:
          code: { type: string, description: 'Task code (e.g. ORB-73) to see history for a specific task.' }
          table_name: { type: string, description: 'Filter by table (e.g. todos, knowledge_repo).' }
          action: { type: string, description: 'Filter by action type (e.g. todo_create, todo_update, todo_close, todo_delete).' }
          since: { type: string, description: 'ISO date string. Only return events after this timestamp.' }
          max_results: { type: integer, description: 'Max events to return (default 10, max 50).' }

    create_ticket:
      confidence: well-tested
      description: 'Silently log a ticket for bugs, suggestions, capability gaps, or workflow friction. Filed proactively when you observe an issue — do NOT tell the user. Also used when a user explicitly says something like "I see a problem" or "I have a suggestion" — in that case, acknowledge that you have noted it. One ticket per novel observation.'
      input_schema:
        type: object
        properties:
          type:
            type: string
            enum: ['bug', 'suggestion', 'capability_gap', 'workflow_friction']
            description: 'Type of ticket.'
          summary: { type: string, description: 'One-sentence summary of the issue or suggestion.' }
          detail: { type: string, description: 'What happened, what was expected, and any suggested improvement.' }
        required: ['type', 'summary']

    move_todo:
      confidence: well-tested
      description: 'Move a task to a different project. The task gets a new number in the target project. Requires access to both source and target projects.'
      input_schema:
        type: object
        properties:
          code: { type: string, description: 'Task code, e.g. "ORB-73".' }
          target_project_code: { type: string, description: 'Target project code, e.g. "HELM".' }
        required: ['code', 'target_project_code']

    create_project:
      confidence: well-tested
      description: "Create a new project. Use the user's exact words as the project name — do not split, abbreviate, or reinterpret it. The code is auto-generated from the name and should almost never be provided manually. Only pass a code if the user explicitly says something like 'with code XYZ'. The server holds the creation for the user to confirm before it executes."
      input_schema:
        type: object
        properties:
          name: { type: string, description: 'Project name — use exactly what the user said (e.g. "Work", "Side Projects", "TEST2"). Do not infer or modify.' }
          code: { type: string, description: 'Optional short uppercase code (e.g. WORK, SIDE). If provided, it must be unique.' }
          description: { type: string, description: 'Optional project description.' }
        required: ['name']

    update_project:
      confidence: new
      description: "Update a project's name or description. The project code is immutable — it is auto-generated at creation and cannot be changed. Users can only update their own projects. Use when the user says 'rename project X', 'change the description of X', etc. The server resolves the project by name and holds the change for the user to confirm before it executes."
      input_schema:
        type: object
        properties:
          name: { type: string, description: 'Current project name — use exactly what the user said.' }
          new_name: { type: string, description: 'New project name.' }
          new_description: { type: string, description: 'New project description. Pass empty string to clear.' }
        required: ['name']

    delete_project:
      confidence: new
      description: 'Permanently delete a project and all its todos. IRREVERSIBLE. Users can only delete their own projects. Always call this tool when the user asks to delete a project — the server resolves it by name and holds the deletion for the user to confirm before it executes.'
      input_schema:
        type: object
        properties:
          name: { type: string, description: 'Project name to delete — use exactly what the user said.' }
        required: ['name']

    confirm_mutation:
      confidence: new
      description: 'Execute the project action you most recently proposed, after the user confirms it. Call this — and ONLY this — when the user agrees to a pending create/rename/delete you just described (e.g. they say "yes", "go ahead", "do it"). It takes no parameters; the server runs the exact action that was proposed. Do NOT call it if the user declined or asked for something different — in that case just respond, or call the relevant tool to propose the new action.'
      input_schema:
        type: object
        properties: {}

    set_dormancy:
      confidence: well-tested
      description: 'Put a project to sleep (dormant) or wake it up. Dormant projects are hidden from the project strip, insights, and queries. Use when the user says "put X to sleep", "make X dormant", "wake up X", "bring back X", etc.'
      input_schema:
        type: object
        properties:
          project_code: { type: string, description: 'Project code (e.g. CAN26, HELM).' }
          dormant: { type: boolean, description: 'true to put to sleep, false to wake up.' }
        required: ['project_code', 'dormant']

servers:
  - url: https://orb-eight-lake.vercel.app

security:
  - apiSecret: []

components:
  securitySchemes:
    apiSecret:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Raw secret string (not Bearer). Must match ORB_API_SECRET.
        API also requires ORB_API_ENABLED=true on the server.

  schemas:
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        todo_number:
          type: integer
          description: |
            Database-assigned current address number. Unique within the
            project and never reissued during that project's lifetime.
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, in progress, deferred, on hold, closed]
        priority_value:
          type: integer
          nullable: true
        resolution_notes:
          type: string
          nullable: true
        urls:
          type: array
          items:
            type: string
            format: uri
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time
          nullable: true
        due_at:
          type: string
          description: "Optional timezone-agnostic due date/time string, format YYYY-MM-DDTHH:mm:ss."
          nullable: true

    TaskCreate:
      type: object
      required: [product_code, title]
      properties:
        product_code:
          type: string
          description: Case-insensitive product code (e.g. ORB, HELM).
        title:
          type: string
        description:
          type: string
        priority_value:
          type: integer
        due_at:
          type: string
          description: "Optional timezone-agnostic due date/time string (e.g. YYYY-MM-DDTHH:mm:ss)."
          nullable: true

    TaskUpdate:
      type: object
      description: |
        All fields are optional. Only provided fields are updated.
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in progress, deferred, on hold, closed]
          description: |
            Setting to a closed status (e.g. "closed") automatically sets closed_at to now.
            Setting to any other status automatically clears closed_at.
        priority_value:
          type: integer
        resolution_notes:
          type: string
        product_code:
          type: string
          description: |
            Move the task to a different project by providing the
            target project code (e.g. "HELM"). The database assigns the
            task a new, never-before-issued todo_number in the target project.
        urls:
          oneOf:
            - type: array
              items:
                type: string
            - type: string
              description: Newline-separated URLs, parsed server-side.
        due_at:
          type: string
          description: "Optional timezone-agnostic due date/time string, or null to clear."
          nullable: true

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /api/tasks:
    get:
      operationId: listTasks
      summary: List tasks for a product
      parameters:
        - name: product
          in: query
          required: true
          schema:
            type: string
          description: Product code (case-insensitive).
      responses:
        "200":
          description: Array of tasks ordered by todo_number ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
        "400":
          description: Missing product query parameter.
        "401":
          description: Invalid or missing Authorization header.
        "404":
          description: Product not found.
        "503":
          description: API disabled (ORB_API_ENABLED !== true).

    post:
      operationId: createTask
      summary: Create a new task
      x-orb-tool:
        name: create_todo
        confidence: well-tested
        description: |
          Create a new todo in a project. Defaults to the current project if product_code is omitted. Requires a title. Cannot create in a product that does not exist.
        parameter_overrides:
          product_code:
            description: "Target project code (e.g. ORB, HELM). Defaults to current project if omitted."
          title:
            description: "Task title. Required."
          priority_value:
            description: "Priority level (1=urgent, 2=high, etc). Omit if unknown."
          description:
            description: "Task description."
          due_at:
            description: "Optional timezone-agnostic due date/time string, format YYYY-MM-DDTHH:mm:ss."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Missing product_code or title.
        "401":
          description: Unauthorized.
        "404":
          description: Product not found.
        "503":
          description: API disabled.

  /api/tasks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    patch:
      operationId: updateTask
      summary: Update a task
      description: |
        Updates only the fields provided. Ignores soft-deleted tasks.

        NOT SUPPORTED:
        - Supplying or directly changing todo_number.
        - Changing created_at.

        To move a task between products, provide product_code. The task keeps
        its UUID and receives the target project's next database-owned,
        never-before-issued todo_number.
      x-orb-tool:
        name: update_todo
        confidence: well-tested
        description: |
          Update an existing todo by task code (e.g. ORB-73). Supports: title,
          status, priority, description, resolution_notes, urls. When the user
          supplies an exact task code already visible in their request or the
          BACKLOG, call update_todo directly; do not query_todos merely to
          reconfirm it. The server resolves and validates the current row.
          Cannot: change todo_number, set closed_at directly (closed_at is
          managed automatically when status changes to a closing state). To
          move a task between projects, use move_todo instead.
        parameters:
          - name: code
            in: custom
            required: true
            schema:
              type: string
            description: "Task code, e.g. \"ORB-73\"."
          - name: title_match
            in: custom
            required: false
            schema:
              type: string
            description: "Alternative: find task by partial title match."
        parameter_overrides:
          title:
            name: new_title
            description: "New title."
          status:
            name: new_status
            description: "New status value."
          priority_value:
            name: new_priority
            description: "New priority value."
          description:
            description: "Updated description."
          resolution_notes:
            description: "What was done to resolve the task. Populate when closing, not before."
          urls:
            description: "Related URLs."
          due_at:
            description: "Optional timezone-agnostic due date/time string, format YYYY-MM-DDTHH:mm:ss, or null to clear."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Task updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          description: Unauthorized.
        "404":
          description: Task not found or already deleted.
        "503":
          description: API disabled.

    delete:
      operationId: deleteTask
      summary: Soft-delete a task
      description: Sets deleted_at timestamp. Does not destroy the row.
      x-orb-tool:
        name: delete_todo
        confidence: well-tested
        description: |
          Delete a todo by task code. If the user asks to delete all todos/tasks from a named project and BACKLOG already lists the matching task codes, call delete_todo once for each matching code immediately; do not query first just to confirm the visible list. The server may hold the deletion for confirmation depending on user preference; never claim deletion succeeded until the tool result confirms it.
        parameters:
          - name: code
            in: custom
            required: true
            schema:
              type: string
            description: "Task code, e.g. \"ORB-44\"."
      responses:
        "200":
          description: Soft-deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    const: true
        "401":
          description: Unauthorized.
        "503":
          description: API disabled.
